<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MovieRec</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div class="header-container">
            <button class="menu-toggle">☰</button>
            <div class="user-panel">
                <a href="/login">Войти</a>
                <a href="/register" class="btn-outline">Регистрация</a>
            </div>
        </div>
    </header>

    <main class="landing">
        <h1>🎬 MovieRec</h1>
        <p>Откройте мир кино с персональными рекомендациями</p>
        <div class="btn-group">
            <a href="/login" class="btn">Войти</a>
            <a href="/register" class="btn btn-outline-light">Регистрация</a>
        </div>
    </main>

    <script>
        document.querySelector('.menu-toggle').addEventListener('click', function() {
            document.querySelector('.user-panel').classList.toggle('show');
        });
    </script>
</body>
</html>
